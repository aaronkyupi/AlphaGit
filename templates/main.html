<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AlphaGit Pro v2.9 // Cyber Command</title>
    <style>
        :root { --bg: #050505; --neon: #00ff41; --dim: #005f18; --blue: #00e5ff; --red: #ff0055; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--dim); border-bottom: 2px solid var(--neon); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; color: var(--neon); text-shadow: 0 0 5px var(--neon); }
        .container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 35%; padding: 15px; border-right: 1px solid var(--neon); background: #0a0a0a; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .card { border: 1px solid var(--neon); padding: 10px; background: #000; }
        .card h3 { color: var(--blue); border-bottom: 1px dashed var(--neon); margin: 0 0 8px 0; font-size: 0.8em; }
        .input-group { display: flex; gap: 5px; margin-bottom: 5px; }
        input { flex: 1; padding: 6px; background: #111; border: 1px solid var(--neon); color: var(--neon); font-size: 0.85em; }
        button { padding: 8px; background: var(--dim); border: 1px solid var(--neon); color: #fff; cursor: pointer; font-weight: bold; }
        button:hover { background: var(--neon); color: #000; }
        .main-display { width: 65%; display: flex; flex-direction: column; background: #000; }
        .terminal-window { flex: 1; padding: 15px; overflow-y: auto; color: var(--neon); font-size: 0.85em; border-bottom: 1px solid #222; }
        .cli-output { background: #0a0a0a; border-top: 1px solid var(--neon); padding: 10px; color: var(--blue); font-size: 0.8em; }
        .repo-grid { background: #050505; height: 200px; padding: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; overflow-y: auto; }
        .repo-card { border: 1px solid #333; padding: 5px; background: #111; font-size: 0.75em; cursor: pointer; }
    </style>
</head>
<body>
    <header><h1>AlphaGit Pro v2.9</h1><div id="status" class="status-badge">OFFLINE</div></header>
    <div class="container">
        <aside class="sidebar">
            <div class="card">
                <h3>// AUTH</h3>
                <input type="text" id="user" placeholder="Username"><input type="password" id="token" placeholder="Token">
                <button onclick="connect()">Link System</button>
            </div>
            <div class="card">
                <h3>// CREATE / UPDATE</h3>
                <div class="input-group"><input type="text" id="cPath" placeholder="Path"><button onclick="browse('cPath')">...</button></div>
                <input type="text" id="cName" placeholder="Repo Name"><button onclick="create()">[+] Push New</button>
                <button onclick="update()" style="margin-top:5px;">[>] Sync Updates</button>
                <button onclick="openFolder()" style="margin-top:5px; background:#222;">[O] Open Folder</button>
            </div>
            <div class="card">
                <h3>// DOWNLOAD / CLONE</h3>
                <div class="input-group"><input type="text" id="clPath" placeholder="Clone Path"><button onclick="browse('clPath')">...</button></div>
                <input type="text" id="clName" placeholder="Repo Name to Download">
                <button onclick="cloneRepo()">[*] Pull from Cloud</button>
            </div>
            <div class="card">
                <h3>// TERMINATE</h3>
                <input type="text" id="dName" placeholder="Repo Name to Delete">
                <button onclick="del()" style="background:#2a0000; color:var(--red); border-color:var(--red);">[X] Delete Remote Repo</button>
            </div>
            <button onclick="list()">[=] Refresh List</button>
        </aside>
        <main class="main-display">
            <div class="terminal-window" id="term"></div>
            <div class="repo-area"><div class="repo-grid" id="repos"></div></div>
            <div class="cli-output"><span style="color:var(--neon)">alpha_user@sys:~$ </span><span id="cliText">Waiting...</span></div>
        </main>
    </div>
    <script>
        const log = (m) => {
            const e = document.createElement('div'); e.className = 'log-entry';
            e.innerText = `[${new Date().toLocaleTimeString()}] ${m}`;
            const t = document.getElementById('term'); t.appendChild(e); t.scrollTop = 9999;
        };
        const setCli = (cmd) => { document.getElementById('cliText').innerText = cmd; };

        async function browse(id) {
            const res = await fetch('/api/select_folder'); const d = await res.json();
            if(d.path) document.getElementById(id).value = d.path;
        }

        async function connect() {
            setCli("GET api.github.com/user");
            const res = await fetch('/api/connect', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:document.getElementById('user').value, token:document.getElementById('token').value})});
            const d = await res.json(); log(d.message);
        }

        async function list() {
            setCli("GET api.github.com/user/repos");
            const res = await fetch('/api/list'); const d = await res.json();
            const grid = document.getElementById('repos'); grid.innerHTML = "";
            d.data.forEach(r => {
                const c = document.createElement('div'); c.className = 'repo-card';
                c.innerHTML = `<b>${r.name}</b><br><span style="color:var(--blue)">${r.visibility}</span>`;
                c.onclick = () => { document.getElementById('dName').value = r.name; document.getElementById('clName').value = r.name; };
                grid.appendChild(c);
            });
        }

        async function cloneRepo() {
            const path = document.getElementById('clPath').value;
            const name = document.getElementById('clName').value;
            setCli(`git clone https://github.com/user/${name}.git ${path}`);
            const res = await fetch('/api/clone', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({repo_name: name, target_path: path})});
            const d = await res.json(); log(d.message);
        }

        async function update() {
            const path = document.getElementById('cPath').value;
            setCli(`git push (Path: ${path})`);
            const res = await fetch('/api/update', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({folder_path: path})});
            const d = await res.json(); log(d.message);
        }

        async function del() {
            const name = document.getElementById('dName').value;
            if(!name || !confirm(`Permanently delete ${name}?`)) return;
            setCli(`DELETE repos/${name}`);
            const res = await fetch('/api/delete', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({repo_name: name})});
            const d = await res.json(); log(d.message);
        }

        async function openFolder() {
            const path = document.getElementById('cPath').value;
            setCli(`os.startfile('${path}')`);
            await fetch('/api/open_explorer', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({path})});
        }
    </script>
</body>
</html>
